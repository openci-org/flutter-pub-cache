name: Flutter Pub Cache
description: Restore or save Flutter pub cache archives in Firebase Storage or Google Cloud Storage.
author: OpenCI

inputs:
  action:
    description: Cache operation to run.
    required: true
  service-account:
    description: Google service account JSON with permission to read and write the storage bucket. Falls back to FIREBASE_SERVICE_ACCOUNT.
    required: false
    default: ""
  storage-bucket:
    description: Storage bucket name. If omitted, the action reads storageBucket from firebase-options-path.
    required: false
    default: ""
  firebase-options-path:
    description: Path to a Firebase options file containing storageBucket.
    required: false
    default: "lib/firebase_options.dart"
  cache-path:
    description: Pub cache directory to archive.
    required: false
    default: "~/.pub-cache"
  key-prefix:
    description: Storage object prefix for cache archives.
    required: false
    default: "caches/flutter-pub"
  namespace:
    description: Additional cache namespace for monorepos or multiple Flutter apps.
    required: false
    default: "default"
  dependency-paths:
    description: Optional newline-delimited file or glob patterns used to compute the dependency hash. Defaults to auto-detecting pubspec.yaml and pubspec.lock files.
    required: false
    default: ""
  working-directory:
    description: Directory where dependency paths and firebase-options-path are resolved.
    required: false
    default: "."
  repository:
    description: Repository component for the cache object name.
    required: false
    default: ""
  fail-on-error:
    description: Fail the workflow when restore or save fails. Usage errors still fail regardless of this setting.
    required: false
    default: "false"

outputs:
  cache-hit:
    description: true when restore downloaded an archive, false on miss or save.
    value: ${{ steps.cache.outputs.cache-hit }}
  cache-saved:
    description: true when save uploaded a new archive, false otherwise.
    value: ${{ steps.cache.outputs.cache-saved }}
  object-name:
    description: Google Cloud Storage object name used for the cache archive.
    value: ${{ steps.cache.outputs.object-name }}

runs:
  using: composite
  steps:
    - id: cache
      shell: bash
      env:
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_SERVICE_ACCOUNT: ${{ inputs.service-account }}
        INPUT_STORAGE_BUCKET: ${{ inputs.storage-bucket }}
        INPUT_FIREBASE_OPTIONS_PATH: ${{ inputs.firebase-options-path }}
        INPUT_CACHE_PATH: ${{ inputs.cache-path }}
        INPUT_KEY_PREFIX: ${{ inputs.key-prefix }}
        INPUT_NAMESPACE: ${{ inputs.namespace }}
        INPUT_DEPENDENCY_PATHS: ${{ inputs.dependency-paths }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      run: |
        set +e
        "${GITHUB_ACTION_PATH}/src/flutter-pub-cache.sh" "${INPUT_ACTION}"
        code="$?"
        set -e

        if [ "$code" -eq 0 ]; then
          exit 0
        fi

        case "${INPUT_FAIL_ON_ERROR}" in
          true|TRUE|True|1|yes|YES|Yes)
            exit "$code"
            ;;
        esac

        if [ "$code" -eq 2 ]; then
          exit "$code"
        fi

        echo "::warning title=Flutter pub cache ${INPUT_ACTION} failed::Continuing because fail-on-error is false. Exit code: ${code}"
